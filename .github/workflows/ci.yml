name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # The pick-slip parser capability test OCRs a scanned PDF, so the runner
      # needs poppler (pdftoppm) + tesseract. The demo flow no longer parses the
      # PDF, but the parser and its test still exercise this path.
      - name: Install OCR system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils tesseract-ocr

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      # Locked install (uv.lock) so CI runs the exact versions used locally.
      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest
